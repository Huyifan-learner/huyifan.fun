<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0d0d0d;--white:#f5f5f3;--grey1:#888;--grey2:#bbb;--grey3:#e2e2e0;}
body{background:var(--white);color:var(--black);font-family:'EB Garamond',serif;font-weight:400;line-height:1.75;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 3rem;height:52px;
  background:var(--white);border-bottom:1px solid var(--grey3);
}
.nav-logo{font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.06em;color:var(--black);text-decoration:none;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey1);text-decoration:none;transition:color .15s;}
.nav-links a:hover,.nav-links a.active{color:var(--black);}

.article{max-width:620px;margin:0 auto;padding:100px 2.5rem 100px;}

.article-back{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--grey1);text-decoration:none;
  margin-bottom:2.5rem;display:block;transition:color .15s;
}
.article-back:hover{color:var(--black);}

.article-meta{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--grey1);margin-bottom:1.5rem;
  display:flex;gap:1.5rem;
}

.article h1{
  font-size:clamp(1.9rem,4vw,2.8rem);
  font-weight:400;line-height:1.18;letter-spacing:-0.01em;
  margin-bottom:2.5rem;
  padding-bottom:2rem;
  border-bottom:1px solid var(--grey3);
}

/* body prose */
.prose p{font-size:1.1rem;line-height:1.9;margin-bottom:1.4rem;color:#222;}
.prose p:first-child::first-letter{font-size:3.2rem;line-height:0.8;float:left;margin:0.1em 0.1em 0 0;font-weight:400;}
.prose h2{font-size:1.35rem;font-weight:400;font-style:italic;margin:2.5rem 0 1rem;}
.prose blockquote{
  margin:2rem 0;padding:0 0 0 1.5rem;
  border-left:2px solid var(--grey3);
  color:var(--grey1);font-style:italic;font-size:1.05rem;line-height:1.85;
}

/* footer nav */
.article-footer{
  margin-top:4rem;padding-top:2rem;
  border-top:1px solid var(--grey3);
  display:flex;justify-content:space-between;align-items:center;
}
.article-footer a{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--grey1);text-decoration:none;transition:color .15s;
}
.article-footer a:hover{color:var(--black);}

@media(max-width:600px){
  nav{padding:0 1.5rem;}
  .article{padding:90px 1.5rem 60px;}
}
</style>
</head>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客 · H.com</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0d0d0d;--white:#f5f5f3;--grey1:#888;--grey2:#bbb;--grey3:#e2e2e0;}
    
    /* 平滑滚动 - 核心代码 */
    html {
        scroll-behavior: smooth;
    }
    
    html, body {
        min-height: 100vh;
        overflow-x: hidden;
    }
    
    body{
        background:var(--white);
        color:var(--black);
        font-family:'EB Garamond',serif;
        font-weight:400;
        line-height:1.75;
    }

    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 3rem;height:52px;
      background:var(--white);border-bottom:1px solid var(--grey3);
    }
    .nav-logo{font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.06em;color:var(--black);text-decoration:none;}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey1);text-decoration:none;transition:color .15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--black);}

    .page{
        max-width:680px;
        margin:0 auto;
        padding:100px 2.5rem 120px;   /* 增加底部空间，方便测试滚动 */
    }

    .page-header{margin-bottom:3.5rem;padding-bottom:2rem;border-bottom:1px solid var(--grey3);}

    .page-back{
      display:inline-flex;align-items:center;gap:6px;
      font-family:'DM Mono',monospace;font-size:0.58rem;
      letter-spacing:0.12em;text-transform:uppercase;
      color:var(--grey1);text-decoration:none;
      margin-bottom:2rem;display:block;transition:color .15s;
    }
    .page-back:hover{color:var(--black);}

    .page-kicker{
      font-family:'DM Mono',monospace;font-size:0.6rem;
      letter-spacing:0.18em;text-transform:uppercase;
      color:var(--grey1);margin-bottom:1rem;
    }

    .page-title{
      font-size:clamp(2rem,4.5vw,3rem);
      font-weight:400;line-height:1.15;letter-spacing:-0.01em;
    }

    /* post list */
    .post-featured{
      display:block;text-decoration:none;color:inherit;
      padding:2.2rem 0;
      border-bottom:1px solid var(--grey3);
      transition:opacity .15s;
    }
    .post-featured:hover{opacity:0.55;}

    .pf-meta{
      font-family:'DM Mono',monospace;font-size:0.58rem;
      letter-spacing:0.1em;text-transform:uppercase;
      color:var(--grey1);margin-bottom:0.8rem;
      display:flex;gap:1.5rem;
    }

    .pf-title{
      font-size:1.5rem;font-weight:400;line-height:1.2;
      margin-bottom:0.7rem;letter-spacing:-0.01em;
    }

    .pf-excerpt{font-size:0.95rem;color:var(--grey1);line-height:1.8;}

    .post-item{
      display:grid;grid-template-columns:86px 1fr 72px;
      align-items:baseline;gap:1.5rem;
      padding:1.1rem 0;
      border-bottom:1px solid var(--grey3);
      text-decoration:none;color:inherit;
      transition:opacity .15s;
    }
    .post-item:hover{opacity:0.5;}

    .pi-date{
      font-family:'DM Mono',monospace;
      font-size:0.58rem;letter-spacing:0.06em;color:var(--grey2);
    }
    .pi-title{font-size:1rem;font-weight:400;}
    .pi-cat{
      font-family:'DM Mono',monospace;font-size:0.55rem;
      letter-spacing:0.1em;text-transform:uppercase;
      color:var(--grey2);text-align:right;
    }

    @media(max-width:600px){
      nav{padding:0 1.5rem;}
      .page{padding:90px 1.5rem 100px;}
      .post-item{grid-template-columns:72px 1fr;gap:1rem;}
      .pi-cat{display:none;}
    }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">huyifan.fun</a>
  <ul class="nav-links">
    <li><a href="blog.html" class="active">个人创作空间</a></li>
    <li><a href="podcast.html">播客</a></li>
  </ul>
</nav>

<div class="page">
  <a class="page-back" href="index.html">← 返回</a>

  <header class="page-header">
    <p class="page-kicker">Space</p>
    <h1 class="page-title">个人创作空间</h1>
  </header>

  <!-- 精选文章 -->
  <a class="post-featured" href="article.html">
    <div class="pf-meta">
      <span>2026 · 04 · 09</span>
    </div>
    <h2 class="pf-title">我们是兄弟</h2>
    <p class="pf-excerpt">We are brother</p>
  </a>

    <a class="post-featured" href="2026.4.10.html">
    <div class="pf-meta">
      <span>2026 · 04 · 10</span>
    </div>
    <h2 class="pf-title">2026.04.10</h2>
    <p class="pf-excerpt">日记</p>
  </a>
  <!-- 这里可以继续添加更多文章，后续内容越多，滚动范围就会自动越大 -->

</div>

</body>
</html>
